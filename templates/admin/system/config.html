{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/admin_system.css' %}">
<div class="admin-system-container">
    <h1>Системная информация</h1>
    
    <div class="admin-system-card">
        <h2>Версии компонентов</h2>
        <table class="admin-system-table">
            {% for key, value in system_info.items %}
            <tr>
                <td><strong>{{ key }}:</strong></td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
    
    <div class="admin-system-card">
        <h2>Журнал событий</h2>
        <p>Здесь будет отображаться лог операций системного администратора</p>
    </div>
</div>
{% endblock %}
